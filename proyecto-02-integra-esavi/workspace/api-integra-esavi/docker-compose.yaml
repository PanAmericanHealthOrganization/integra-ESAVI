services:
  db_dhis2_esavi:
    container_name: db_dhis2_2_36_12
    platform: linux/amd64
    image: postgis/postgis:14-3.4-alpine
    environment:
      POSTGRES_DB: dhi_esavi
      POSTGRES_USER: dhis
      POSTGRES_PASSWORD: dhis
    volumes:
      - ./data:/var/lib/postgresql
    ports:
      - "5432:5432"
  oracle_db:
    image: gvenzl/oracle-free:latest
    container_name: oracle_db
    restart: unless-stopped
    environment:
      ORACLE_DATABASE: DB_VACUNACION
      ORACLE_USER: USR.ROLANDOCASIGNA
      ORACLE_PASSWORD: Salud.2025
      ORACLE_PASSWORD_SECRET: Salud.2025
      ORACLE_ALLOW_REMOTE: true
    ports:
      - "1521:1521"
    volumes:
      - ./oracle_data:/opt/oracle/oradata
    extra_hosts:
      - "scan19c-mspvacuna-prod.msp.gob.ec:host-gateway"