services:
  postgres:
    image: postgres:15
    container_name: postgres_esavi
    environment:
      POSTGRES_USER: dhis
      POSTGRES_PASSWORD: dhis
      POSTGRES_DB: dhi_esavi
      TZ: America/Guayaquil
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dhis -d dhi_esavi"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db-init:
    image: postgres:15
    container_name: db_init_esavi
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: dhis
    volumes:
      - ./scripts/init-db.sh:/init-db.sh
    entrypoint: ["/bin/bash", "/init-db.sh"]

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: keycloak_server
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin_password
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password123
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./scripts/keycloak-realm.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      db-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
