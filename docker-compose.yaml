version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NAME_DATABASE}
      POSTGRES_USER: ${USER_DATABASE}
      POSTGRES_PASSWORD: ${PASS_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    